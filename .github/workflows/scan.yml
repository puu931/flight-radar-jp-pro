name: Flight Scan

on:
  schedule:
    # All times UTC. JST = UTC + 9.
    - cron: "0 0 * * *"   # 09:00 JST
    - cron: "0 6 * * *"   # 15:00 JST
    - cron: "0 14 * * *"  # 23:00 JST
  workflow_dispatch: {}

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install deps
        working-directory: backend
        run: pip install -r requirements.txt

      - name: Run scan
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          AMADEUS_API_KEY: ${{ secrets.AMADEUS_API_KEY }}
          AMADEUS_API_SECRET: ${{ secrets.AMADEUS_API_SECRET }}
          TRAVELPAYOUTS_TOKEN: ${{ secrets.TRAVELPAYOUTS_TOKEN }}
          TRAVELPAYOUTS_MARKER: ${{ secrets.TRAVELPAYOUTS_MARKER }}
          SERPAPI_KEY: ${{ secrets.SERPAPI_KEY }}
          FLIGHT_SOURCES: ${{ vars.FLIGHT_SOURCES || 'mock' }}
          DATABASE_URL: sqlite:///./flights.db
        run: python scripts/scan.py

      - name: Commit price history
        run: |
          git config user.name "flight-radar-bot"
          git config user.email "bot@users.noreply.github.com"
          git add flights.db || true
          git diff --cached --quiet || git commit -m "chore: update price history [skip ci]"
          git push || true
