name: Supabase Keep-Alive

# Free-tier Supabase auto-pauses after 7 days without API activity.
# Note: "activity" here means hits to Supabase's own APIs (PostgREST / Auth),
# NOT raw Postgres connections from our backend. So we ping /auth/v1/health
# directly — that's what the pause-watcher actually counts.

on:
  schedule:
    - cron: "0 3 * * *"   # 03:00 UTC = 12:00 JST, every day
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Ping Supabase auth health
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          set -e
          code=$(curl -s -o /tmp/resp.json -w "%{http_code}" --max-time 30 \
            -H "apikey: $SUPABASE_ANON_KEY" \
            "$SUPABASE_URL/auth/v1/health")
          echo "http=$code"
          head -c 200 /tmp/resp.json; echo
          [ "$code" = "200" ] || exit 1
