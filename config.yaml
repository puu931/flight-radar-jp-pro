airlines:
  - BR   # EVA Air
  - JX   # Starlux
  - CI   # China Airlines

routes:
  - origin: TPE
    destination: NRT
    max_price: 9000
  - origin: TPE
    destination: HND
    max_price: 9500
  - origin: TPE
    destination: KIX
    max_price: 8500
  - origin: TPE
    destination: FUK
    max_price: 7500
  - origin: TPE
    destination: OKA
    max_price: 6500

filters:
  direct_only: true
  baggage_required: false   # Travelpayouts/cheap-aggregator 不回傳行李資訊；自己訂票時再核對
  avoid_red_eye: true
  departure_after: "08:00"
  arrival_before: "22:30"
  exclude_basic_fare: true

search:
  future_days: 90
  trip_length_days: [3, 4, 5, 6, 7]
  currency: TWD

notification:
  cooldown_hours: 24
  dedupe: true
