airlines:
  - BR   # EVA Air
  - JX   # Starlux
  - CI   # China Airlines

trip:
  type: round_trip          # round_trip | one_way
  stay_days: [4, 5, 6, 7]
  top_n_alerts: 5           # alert only the N cheapest combos per scan

routes:
  - origin: TPE
    destination: NRT
    max_price: 10000        # one-way fallback
    max_round_trip: 18000
  - origin: TPE
    destination: HND
    max_price: 11500
    max_round_trip: 21000
  - origin: TPE
    destination: KIX
    max_price: 9500
    max_round_trip: 17000
  - origin: TPE
    destination: FUK
    max_price: 12000
    max_round_trip: 22000
  - origin: TPE
    destination: OKA
    max_price: 11000
    max_round_trip: 20000

filters:
  direct_only: true
  baggage_required: false   # Travelpayouts/cheap-aggregator 不回傳行李資訊；自己訂票時再核對
  avoid_red_eye: true
  departure_after: "08:00"
  arrival_before: "22:30"
  exclude_basic_fare: true

search:
  future_days: 90
  trip_length_days: [3, 4, 5, 6, 7]
  currency: TWD

notification:
  cooldown_hours: 24
  dedupe: true
